<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ربط فيسبوك | Finora Publisher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='IMG_0200.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='IMG_0200.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #020617;
      color: #e5e7eb;
      font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .shell {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      background: rgba(15,23,42,0.96);
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 20px 40px rgba(0,0,0,0.55);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .card-subtitle {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 4px;
    }
    .btn-primary {
      background: linear-gradient(135deg,#1d4ed8,#3b82f6);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ghost {
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .toast-container {
      position: fixed;
      bottom: 16px;
      inset-inline: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
    }
    .toast {
      max-width: 420px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      background: rgba(15,23,42,0.98);
      border: 1px solid rgba(148,163,184,0.6);
      color: #e5e7eb;
      pointer-events: auto;
    }
    .toast.error { border-color: rgba(248,113,113,0.8); color: #fecaca; }
    .toast.success { border-color: rgba(34,197,94,0.7); color: #bbf7d0; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="card-title">ربط حساب فيسبوك</div>
      <div class="card-subtitle">
        سيتم استخدام هذا الربط لجلب الصفحات تلقائياً إلى لوحة النشر. تأكد أولاً من إدخال
        <strong>Facebook App ID / App Secret</strong> في صفحة الإعدادات.
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;align-items:center;">
        <button id="fbConnectBtn" class="btn-primary" type="button">
          ربط فيسبوك وجلب الصفحات
        </button>
        <button id="goDashboardBtn" class="btn-ghost" type="button" onclick="window.location.href='{{ url_for('publish_ui.dashboard') }}'">
          الذهاب إلى لوحة النشر
        </button>
      </div>
    </div>
  </div>

  <div id="publishConnectToast" class="toast-container"></div>

  <script>
    (function () {
      'use strict';
      const API_BASE = (window.PUBLISH_API_BASE || '/publish/api').replace(/\/+$/, '');
      const fbConnectBtn = document.getElementById('fbConnectBtn');
      const toastContainer = document.getElementById('publishConnectToast');

      function toast(message, type = 'info', timeout = 4000) {
        if (!toastContainer) return;
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = message;
        toastContainer.appendChild(el);
        setTimeout(() => el.remove(), timeout);
      }

      async function connectFacebook() {
        try {
          const res = await fetch(API_BASE + '/facebook/login-url', { credentials: 'include' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data?.success || !data.login_url) {
            toast(data?.error || 'فشل تجهيز تسجيل الدخول إلى فيسبوك.', 'error');
            return;
          }
          window.location.href = data.login_url;
        } catch (e) {
          toast('فشل الاتصال بالخادم.', 'error');
        }
      }

      if (fbConnectBtn) {
        fbConnectBtn.addEventListener('click', connectFacebook);
      }
    })();
  </script>
</body>
</html>
