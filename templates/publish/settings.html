<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إعدادات النشر | Finora Publisher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='IMG_0200.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='IMG_0200.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #020617;
      color: #e5e7eb;
      font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .shell {
      max-width: 640px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      background: rgba(15,23,42,0.96);
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 20px 40px rgba(0,0,0,0.55);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .card-subtitle {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 4px;
    }
    .field-label {
      font-size: 0.82rem;
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(55,65,81,0.9);
      background: #020617;
      color: #e5e7eb;
      font-size: 0.85rem;
      padding: 6px 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg,#1d4ed8,#3b82f6);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .toast-container {
      position: fixed;
      bottom: 16px;
      inset-inline: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 50;
    }
    .toast {
      max-width: 420px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      background: rgba(15,23,42,0.98);
      border: 1px solid rgba(148,163,184,0.6);
      color: #e5e7eb;
      pointer-events: auto;
    }
    .toast.error { border-color: rgba(248,113,113,0.8); color: #fecaca; }
    .toast.success { border-color: rgba(34,197,94,0.7); color: #bbf7d0; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="card-title">إعدادات تطبيق فيسبوك</div>
      <div class="card-subtitle">أدخل App ID و App Secret المستخدمين في النشر على فيسبوك.</div>
      <div style="margin-top:14px;">
        <div class="field-label">Facebook App ID</div>
        <input id="fbAppId" class="input" placeholder="مثال: 1234567890">
      </div>
      <div style="margin-top:10px;">
        <div class="field-label">Facebook App Secret</div>
        <input id="fbAppSecret" class="input" placeholder="الرمز السري للتطبيق">
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-start;gap:8px;">
        <button id="saveBtn" class="btn-primary" type="button">
          حفظ الإعدادات
        </button>
      </div>
    </div>
  </div>

  <div id="publishSettingsToast" class="toast-container"></div>

  <script>
    (function () {
      'use strict';

      const API_BASE = (window.PUBLISH_API_BASE || '/publish/api').replace(/\/+$/, '');
      const fbAppId = document.getElementById('fbAppId');
      const fbAppSecret = document.getElementById('fbAppSecret');
      const saveBtn = document.getElementById('saveBtn');
      const toastContainer = document.getElementById('publishSettingsToast');

      function toast(message, type = 'info', timeout = 4000) {
        if (!toastContainer) return;
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.textContent = message;
        toastContainer.appendChild(el);
        setTimeout(() => el.remove(), timeout);
      }

      async function loadSettings() {
        try {
          const res = await fetch(API_BASE + '/settings', { credentials: 'include' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data?.success) {
            toast(data?.error || 'فشل تحميل الإعدادات.', 'error');
            return;
          }
          if (fbAppId && data.settings?.facebook_app_id) {
            fbAppId.value = data.settings.facebook_app_id;
          }
          if (fbAppSecret && data.settings?.facebook_app_secret) {
            fbAppSecret.value = data.settings.facebook_app_secret;
          }
        } catch (e) {
          toast('فشل الاتصال بالخادم لتحميل الإعدادات.', 'error');
        }
      }

      async function saveSettings() {
        const payload = {
          facebook_app_id: fbAppId && fbAppId.value || '',
          facebook_app_secret: fbAppSecret && fbAppSecret.value || ''
        };

        try {
          const res = await fetch(API_BASE + '/settings', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data?.success) {
            toast(data?.error || 'فشل حفظ الإعدادات.', 'error');
            return;
          }
          toast('تم حفظ الإعدادات بنجاح.', 'success');
        } catch (e) {
          toast('فشل الاتصال بالخادم أثناء حفظ الإعدادات.', 'error');
        }
      }

      if (saveBtn) {
        saveBtn.addEventListener('click', saveSettings);
      }

      loadSettings();
    })();
  </script>
</body>
</html>
