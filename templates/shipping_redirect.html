<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - {{ shipping_company.name }}</title>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem("theme");
          var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/saas-admin.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background:
              radial-gradient(900px 420px at 120% -10%, rgba(59, 130, 246, 0.18), transparent 60%),
              radial-gradient(760px 360px at -20% 0%, rgba(139, 92, 246, 0.14), transparent 56%),
              var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
            padding: 20px;
            color: var(--text);
        }

        .redirect-container {
            background: linear-gradient(145deg, var(--card), var(--card-alt));
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-2);
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .redirect-container h1 {
            color: var(--text);
            font-size: 24px;
            margin-bottom: 16px;
        }

        .redirect-container p {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .company-name {
            color: #3b82f6;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .redirect-btn {
            display: inline-block;
            padding: 16px 32px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h1>🚚 تسجيل دخول مطلوب</h1>
        <div class="company-name">{{ shipping_company.name }}</div>
        <p>
            تم تحديث النظام. يرجى تسجيل الدخول للوصول إلى كشوفات الشركة.
        </p>
        <a href="{{ login_url }}" class="redirect-btn">تسجيل الدخول</a>
    </div>
</body>
</html>
