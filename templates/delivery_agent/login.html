<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول المندوب</title>
  <script>
    (function() {
      try {
        var saved = localStorage.getItem("theme");
        var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/saas-admin.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background:
        radial-gradient(900px 420px at 120% -10%, rgba(59, 130, 246, 0.18), transparent 60%),
        radial-gradient(760px 360px at -20% 0%, rgba(139, 92, 246, 0.14), transparent 56%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }
    
    .login-container {
      background: linear-gradient(145deg, var(--card), var(--card-alt));
      border-radius: 24px;
      padding: 48px;
      max-width: 450px;
      width: 100%;
      box-shadow: var(--shadow-2);
      border: 1px solid var(--border-light);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header h1 {
      color: #f1f5f9;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .login-header p {
      color: #94a3b8;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .form-group input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      font-size: 16px;
      font-family: 'Tajawal', sans-serif;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: rgba(15, 23, 42, 0.8);
    }
    
    .form-group input::placeholder {
      color: #64748b;
    }
    
    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Tajawal', sans-serif;
      margin-top: 8px;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .icon-wrapper {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .icon-wrapper i {
      font-size: 64px;
      color: #3b82f6;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="icon-wrapper">
      <i class="fas fa-user-tie"></i>
    </div>
    
    <div class="login-header">
      <h1>🚚 تسجيل دخول المندوب</h1>
      <p>أدخل بياناتك للدخول إلى حسابك</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="login-btn">
        <span>🔐</span>
        <span>تسجيل الدخول</span>
      </button>
    </form>
  </div>

  <script>
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 5000);
    }
    
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!username || !password) {
        showError('⚠️ يرجى إدخال اسم المستخدم وكلمة المرور');
        return;
      }
      
      fetch('/delivery-agent/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: username, password: password})
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          window.location.href = data.redirect || '/delivery-agent/dashboard';
        } else {
          showError('❌ ' + (data.error || 'فشل تسجيل الدخول'));
        }
      })
      .catch(error => {
        showError('❌ حدث خطأ أثناء تسجيل الدخول');
        console.error(error);
      });
    }
  </script>
</body>
</html>
