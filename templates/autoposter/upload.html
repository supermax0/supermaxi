<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رفع فيديو | Autoposter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='autoposter/styles.css') }}">
  <script>
    window.AUTOPOSTER_API_BASE = '{{ request.script_root or "" }}/autoposter';
  </script>
  <style>
    body {
      background: #020617;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .upload-shell {
      max-width: 720px;
      margin: 40px auto;
      padding: 24px;
      background: rgba(15,23,42,0.96);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      border: 1px solid rgba(148,163,184,0.25);
    }
    .upload-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .upload-title {
      font-size: 1.15rem;
      font-weight: 600;
    }
    .upload-subtitle {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 4px;
    }
    .upload-back {
      font-size: 0.85rem;
      color: #93c5fd;
      text-decoration: none;
    }
    .upload-back:hover {
      text-decoration: underline;
    }
    .drop-zone-main {
      border: 1px dashed rgba(148,163,184,0.6);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      background: radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 55%);
      cursor: pointer;
      transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.12s ease;
    }
    .drop-zone-main.dragover {
      border-color: #60a5fa;
      background-color: rgba(15,23,42,0.9);
      transform: translateY(-1px);
    }
    .drop-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .hint-primary {
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .hint-secondary {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .hint-secondary strong {
      color: #e5e7eb;
    }
    .upload-actions {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .btn-primary {
      background: linear-gradient(135deg,#1d4ed8,#3b82f6);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary:disabled {
      opacity: 0.65;
      cursor: default;
    }
    .btn-ghost {
      border: none;
      background: transparent;
      color: #93c5fd;
      cursor: pointer;
    }
    .progress-shell {
      margin-top: 18px;
      display: none;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(30,64,175,0.35);
      overflow: hidden;
    }
    .progress-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,#22c55e,#3b82f6);
      transition: width 0.1s linear;
    }
    .preview-shell {
      margin-top: 18px;
      display: none;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(55,65,81,0.8);
    }
    .preview-meta {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preview-video {
      border-radius: 10px;
      overflow: hidden;
      background: black;
    }
    .error-box {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.6);
      font-size: 0.8rem;
      color: #fecaca;
      display: none;
    }
    .success-box {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(34,197,94,0.7);
      font-size: 0.8rem;
      color: #bbf7d0;
      display: none;
    }
    @media (max-width: 640px) {
      .upload-shell {
        margin: 12px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="upload-shell">
    <div class="upload-header">
      <div>
        <div class="upload-title">رفع فيديو للأوتوبوستر</div>
        <div class="upload-subtitle">يدعم mp4 / mov / webm حتى 200MB، مع توليد صورة مصغّرة تلقائياً.</div>
      </div>
      <a href="{{ request.script_root or '' }}/autoposter/" class="upload-back">← الرجوع للوحة الأوتوبوستر</a>
    </div>

    <div id="dropZoneMain" class="drop-zone-main">
      <div class="drop-icon">⬆️</div>
      <div class="hint-primary">اسحب فيديو هنا أو اضغط لاختياره</div>
      <div class="hint-secondary">
        صيغ مدعومة: <strong>MP4 / MOV / WEBM</strong> · حد الحجم: <strong>2GB</strong>
      </div>
      <div class="upload-actions">
        <button type="button" id="selectFileBtn" class="btn-primary">اختيار ملف فيديو</button>
        <button type="button" id="cancelUploadBtn" class="btn-ghost" disabled>إلغاء الرفع</button>
        <button type="button" id="useInPostBtn" class="btn-ghost" style="display:none">استخدام هذا الفيديو في المنشور</button>
      </div>
      <input type="file" id="fileInputHidden" accept="video/*" style="display:none">
    </div>

    <div id="progressShell" class="progress-shell">
      <div class="progress-label">
        <span>جاري الرفع...</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progressInner" class="progress-bar-inner"></div>
      </div>
    </div>

    <div id="previewShell" class="preview-shell">
      <div class="preview-meta" id="previewMeta"></div>
      <div class="preview-video">
        <video id="previewVideo" controls playsinline style="width:100%;max-height:320px;"></video>
      </div>
    </div>

    <div id="successBox" class="success-box"></div>
    <div id="errorBox" class="error-box"></div>
  </div>

  <script src="{{ url_for('static', filename='autoposter/uploader.js') }}"></script>
</body>
</html>
