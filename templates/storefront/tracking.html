<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتبع الطلب</title>
  <style>
    :root{color-scheme:dark;--bg:#08111f;--line:rgba(148,163,184,.2);--text:#e7eefc;--muted:#9eb1cc;--brand:{{ store_design.primary_color }}}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top right,rgba(79,140,255,.18),transparent 24%),linear-gradient(180deg,#0b1627,var(--bg));color:var(--text);font-family:Tahoma,Arial,sans-serif}
    .page{max-width:820px;margin:0 auto;padding:24px 16px 40px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:18px;padding:18px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;border:1px solid var(--line);font-weight:700;background:rgba(255,255,255,.03);color:var(--text);text-decoration:none;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,var(--brand),#2f5ce4);border-color:transparent;color:#fff}
    .field{margin-bottom:10px}
    .field label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
    .field input{width:100%;border-radius:12px;border:1px solid var(--line);padding:11px;background:rgba(255,255,255,.04);color:var(--text)}
    .error{padding:10px 12px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.12);color:#fecaca;margin-top:10px}
    .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <a class="btn" href="{{ url_for('storefront.store_index', tenant_slug=shop_tenant_slug) }}">العودة للمتجر</a>
      <h2 style="margin:0;">تتبع الطلب</h2>
    </div>
    <div class="card">
      <form method="post">
        <div class="field">
          <label>رقم الطلب</label>
          <input type="number" name="invoice_id" min="1" value="{{ form.invoice_id }}" required>
        </div>
        <div class="field">
          <label>رقم الهاتف</label>
          <input type="text" name="phone" value="{{ form.phone }}" required minlength="8">
        </div>
        <button class="btn primary" type="submit">بحث</button>
      </form>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      {% if order %}
      <div style="margin-top:12px;">
        <div class="row"><span>رقم الطلب</span><strong>#{{ order.id }}</strong></div>
        <div class="row"><span>الحالة</span><strong>{{ order.status or '—' }}</strong></div>
        <div class="row"><span>حالة الدفع</span><strong>{{ order.payment_status or '—' }}</strong></div>
        <div class="row"><span>حالة الشحن</span><strong>{{ order.shipping_status or '—' }}</strong></div>
        <div class="row"><span>المبلغ</span><strong>{{ "{:,.0f}".format(order.total or 0) }} د.ع</strong></div>
      </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
