{% extends "base.html" %}

{% block title %}صلاحيات الموظف: {{ employee.name }}{% endblock %}

{% block content %}
<style>
    :root {
        --emp-roles-bg: #0f172a;
        --emp-card-bg: rgba(30, 41, 59, 0.7);
        --emp-border: rgba(255, 255, 255, 0.08);
        --emp-text: #f8fafc;
        --emp-text-secondary: #94a3b8;
        --emp-primary: #6366f1;
        --emp-primary-hover: #4f46e5;
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
        --radius-xl: 16px;
    }

    [data-theme="light"] {
        --emp-card-bg: #ffffff;
        --emp-border: rgba(0, 0, 0, 0.08);
        --emp-text: #0f172a;
        --emp-text-secondary: #64748b;
        --emp-primary: #4f46e5;
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
    }

    .emp-container {
        max-width: 800px;
        margin: 2rem auto;
    }

    .emp-card {
        background: var(--emp-card-bg);
        border: 1px solid var(--emp-border);
        border-radius: var(--radius-xl);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
    }

    .emp-header {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
        padding: 20px 24px;
        border-bottom: 1px solid var(--emp-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    [data-theme="light"] .emp-header {
        background: rgba(99, 102, 241, 0.05);
    }

    .emp-header h5 {
        margin: 0;
        font-weight: 700;
        color: var(--emp-text);
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .emp-header h5 i {
        color: var(--emp-primary);
        font-size: 22px;
    }

    .btn-back-elegant {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--emp-border);
        color: var(--emp-text-secondary);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    [data-theme="light"] .btn-back-elegant {
        background: rgba(0, 0, 0, 0.02);
        color: var(--emp-text-secondary);
    }

    .btn-back-elegant:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--emp-text);
    }

    [data-theme="light"] .btn-back-elegant:hover {
        background: rgba(0, 0, 0, 0.05);
        color: var(--emp-text);
    }

    .emp-body {
        padding: 24px;
    }

    .emp-desc {
        color: var(--emp-text-secondary);
        font-size: 15px;
        margin-bottom: 24px;
    }

    .emp-desc strong {
        color: var(--emp-primary);
    }

    .role-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        margin-bottom: 32px;
    }

    .role-select-card {
        background: rgba(0, 0, 0, 0.15);
        border: 1px solid var(--emp-border);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 16px;
    }

    [data-theme="light"] .role-select-card {
        background: #f8fafc;
    }

    .role-select-card:hover {
        background: rgba(99, 102, 241, 0.05);
        border-color: rgba(99, 102, 241, 0.2);
    }

    [data-theme="light"] .role-select-card:hover {
        background: #f1f5f9;
        border-color: #cbd5e1;
    }

    .role-select-input {
        width: 22px;
        height: 22px;
        margin-top: 2px;
        cursor: pointer;
        flex-shrink: 0;
    }

    .role-select-input:checked {
        background-color: var(--emp-primary);
        border-color: var(--emp-primary);
    }

    /* Highlight card when checked */
    .role-select-card:has(.role-select-input:checked) {
        background: rgba(99, 102, 241, 0.08);
        border-color: var(--emp-primary);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    [data-theme="light"] .role-select-card:has(.role-select-input:checked) {
        background: rgba(79, 70, 229, 0.05);
        border-color: var(--emp-primary);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
    }

    .role-content {
        flex: 1;
    }

    .role-title {
        color: var(--emp-text);
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
        display: block;
        transition: color 0.3s ease;
    }

    .role-perms-wrapper {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .role-perms {
        color: var(--emp-text-secondary);
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
        overflow: hidden;
        opacity: 0;
        min-height: 0;
        transition: opacity 0.3s ease;
    }

    .role-select-card:has(.role-select-input:checked) .role-title,
    .role-select-input:checked+.role-content .role-title {
        color: var(--emp-primary);
    }

    /* Expand the permissions section when checked */
    .role-select-card:has(.role-select-input:checked) .role-perms-wrapper,
    .role-select-input:checked+.role-content .role-perms-wrapper {
        grid-template-rows: 1fr;
    }

    .role-select-card:has(.role-select-input:checked) .role-perms,
    .role-select-input:checked+.role-content .role-perms {
        opacity: 1;
        margin-top: 6px;
    }

    .btn-save-roles {
        background: linear-gradient(135deg, var(--emp-primary), var(--emp-primary-hover));
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
    }

    .btn-save-roles:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px -8px rgba(99, 102, 241, 0.6);
    }
</style>

<div class="container-fluid" dir="rtl">
    <div class="emp-container">
        <div class="emp-card">
            <div class="emp-header">
                <h5><i class="fas fa-user-lock"></i> تعديل أدوار الموظف: {{ employee.name }}</h5>
                <a href="{{ url_for('employees.list_employees') }}" class="btn-back-elegant">
                    <i class="fas fa-arrow-left"></i> عودة
                </a>
            </div>
            <div class="emp-body">
                <form action="{{ url_for('permissions.employee_roles', id=employee.id) }}" method="POST">
                    <p class="emp-desc">
                        اختر الأدوار التي تريد منحها للموظف <strong>{{ employee.name }}</strong> ({{ employee.username
                        }}):
                    </p>

                    <div class="role-grid">
                        {% for role in roles %}
                        <label class="role-select-card" for="role_{{ role.id }}">
                            <input class="form-check-input role-select-input" type="checkbox" name="roles"
                                value="{{ role.id }}" id="role_{{ role.id }}" {% if role in employee.roles %}checked{%
                                endif %}>
                            <div class="role-content">
                                <span class="role-title">{{ role.description or role.name }}</span>
                                <div class="role-perms-wrapper">
                                    <p class="role-perms">
                                        {% if role.permissions %}
                                        {% for perm in role.permissions %}
                                        {{ perm.description or perm.name }}{% if not loop.last %} • {% endif %}
                                        {% endfor %}
                                        {% else %}
                                        بدون صلاحيات محددة
                                        {% endif %}
                                    </p>
                                </div>
                            </div>
                        </label>
                        {% endfor %}
                    </div>

                    <button type="submit" class="btn-save-roles">
                        حفظ الصلاحيات <i class="fas fa-check-circle"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
