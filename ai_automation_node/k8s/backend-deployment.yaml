apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-automation-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-automation-backend
  template:
    metadata:
      labels:
        app: ai-automation-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/ai-automation-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: ai-automation-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
