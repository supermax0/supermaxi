apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-automation-ingress
spec:
  rules:
    - host: ai-automation.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-automation-backend
                port:
                  number: 80
