[pytest]
# إعدادات pytest للنظام المحاسبي
# pytest Configuration for Accounting System

# المسارات التي يبحث فيها pytest عن الاختبارات
testpaths = tests

# نمط أسماء الملفات التي تحتوي على الاختبارات
python_files = test_*.py

# نمط أسماء الدوال/الكلاسات التي تحتوي على الاختبارات
python_classes = Test*
python_functions = test_*

# خيارات العرض
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers مخصصة
markers =
    unit: Unit tests (اختبارات الوحدات)
    integration: Integration tests (اختبارات متكاملة)
    accounting: Accounting logic tests (اختبارات المنطق المحاسبي)
    inventory: Inventory calculation tests (اختبارات حساب المخزون)
    sales: Sales calculation tests (اختبارات حساب المبيعات)
    profit: Profit calculation tests (اختبارات حساب الربح)

# فلترة التحذيرات (اختياري)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
