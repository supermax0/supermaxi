name: AI Automation CI

on:
  push:
    paths:
      - "ai_automation_node/**"
      - ".github/workflows/ai-automation-ci.yml"
  pull_request:
    paths:
      - "ai_automation_node/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_automation_node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai_automation_node/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
