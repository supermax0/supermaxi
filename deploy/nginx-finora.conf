# Nginx — Finora SaaS
# نسخ إلى: /etc/nginx/sites-available/finora
# ثم: ln -sf /etc/nginx/sites-available/finora /etc/nginx/sites-enabled/
# استبدل YOUR_DOMAIN بالنطاق الفعلي (مثال: app.example.com)
# استبدل مسار المشروع (مثل /root/finora-saas أو /var/www/finora/supermaxi) في location /static و /social-ai/assets/

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # واجهة AI Agent Builder — تقديم ملفات البناء (CSS/JS) مباشرة لتفادي خطأ MIME type
    location /social-ai/assets/ {
        alias /root/finora-saas/static/ai_agent_frontend/dist/assets/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static {
        alias /root/finora-saas/static;
    }
}
